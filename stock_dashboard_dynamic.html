<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Classifier Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1a1f35 100%);
            min-height: 100vh;
            padding: 1.5rem;
        }
        
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.5rem;
        }
        
        .filters {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: #94a3b8;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            text-transform: uppercase;
            transition: all 0.2s;
        }
        
        .filter-btn:hover, .filter-btn.active {
            background: rgba(59,130,246,0.2);
            border-color: rgba(59,130,246,0.4);
            color: #93c5fd;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 0.75rem;
        }
        
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 0.75rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .card:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,255,255,0.2);
        }
        
        .card.hidden { display: none; }
        
        .symbol {
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }
        
        .price {
            font-size: 11px;
            color: #22c55e;
            margin-bottom: 0.25rem;
        }
        
        .signal {
            font-size: 10px;
            font-weight: 600;
            padding: 2px 4px;
            border-radius: 4px;
            display: inline-block;
        }
        
        .signal.buy { background: rgba(34,197,94,0.3); color: #86efac; }
        .signal.sell_wait { background: rgba(239,68,68,0.3); color: #fca5a5; }
        .signal.hold { background: rgba(59,130,246,0.3); color: #93c5fd; }
        .signal.quick { background: rgba(245,158,11,0.3); color: #fcd34d; }
        .signal.lost { background: rgba(107,114,128,0.3); color: #d1d5db; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .stat {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 1rem;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: #3b82f6;
        }
        
        .stat-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Stock Classifier</h1>
            <p style="color: #94a3b8; font-size: 13px;">NEPSE Buy Signals</p>
        </div>
        
        <div class="stats" id="stats"></div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterSignal('ALL')">All</button>
            <button class="filter-btn" onclick="filterSignal('BUY')">Buy</button>
            <button class="filter-btn" onclick="filterSignal('SELL_WAIT')">Sell/Wait</button>
            <button class="filter-btn" onclick="filterSignal('HOLD_PROFIT')">Hold</button>
            <button class="filter-btn" onclick="filterSignal('QUICK_PROFIT')">Quick</button>
            <button class="filter-btn" onclick="filterSignal('GET_LOST')">Lost</button>
        </div>
        
        <div class="grid" id="grid"></div>
    </div>

    <script>
        let allStocks = [];
        let currentFilter = 'ALL';
        
        // Load data
        fetch('stocks_data.json')
            .then(r => r.json())
            .then(data => {
                allStocks = data.filter(s => !s.error);
                renderStocks();
                updateStats();
            });
        
        function renderStocks() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            allStocks.forEach(stock => {
                if (currentFilter !== 'ALL' && stock.signal !== currentFilter) return;
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="symbol">${stock.symbol}</div>
                    <div class="price">₹${stock.close}</div>
                    <div class="signal ${getSignalClass(stock.signal)}">${getSignalLabel(stock.signal)}</div>
                `;
                grid.appendChild(card);
            });
        }
        
        function updateStats() {
            const stats = document.getElementById('stats');
            const signals = {};
            
            allStocks.forEach(s => {
                signals[s.signal] = (signals[s.signal] || 0) + 1;
            });
            
            stats.innerHTML = `
                <div class="stat">
                    <div class="stat-value">${allStocks.length}</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${signals.BUY || 0}</div>
                    <div class="stat-label">Buy</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${signals.SELL_WAIT || 0}</div>
                    <div class="stat-label">Sell/Wait</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${signals.HOLD_PROFIT || 0}</div>
                    <div class="stat-label">Hold</div>
                </div>
            `;
        }
        
        function filterSignal(signal) {
            currentFilter = signal;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderStocks();
        }
        
        function getSignalClass(signal) {
            if (signal === 'BUY') return 'buy';
            if (signal === 'SELL_WAIT') return 'sell_wait';
            if (signal === 'HOLD_PROFIT') return 'hold';
            if (signal === 'QUICK_PROFIT') return 'quick';
            return 'lost';
        }
        
        function getSignalLabel(signal) {
            if (signal === 'SELL_WAIT') return 'SELL/WAIT';
            if (signal === 'HOLD_PROFIT') return 'HOLD';
            if (signal === 'QUICK_PROFIT') return 'QUICK';
            if (signal === 'GET_LOST') return 'LOST';
            return signal;
        }
    </script>
</body>
</html>
